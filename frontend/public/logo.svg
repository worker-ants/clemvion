  <line x1="36" y1="16" x2="36" y2="64" stroke="#2a7040" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="36" y1="24" x2="20" y2="36" stroke="#3a9a58" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="36" y1="36" x2="56" y2="28" stroke="#3a9a58" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="36" y1="48" x2="18" y2="58" stroke="#5ab872" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="36" y1="56" x2="54" y2="62" stroke="#5ab872" stroke-width="1.2" stroke-linecap="round"/>
  <circle cx="36" cy="14" r="4" fill="#1a4f2c"/>
  <circle cx="18" cy="36" r="3.5" fill="#2a8a48"/>
  <circle cx="58" cy="27" r="3.5" fill="#2a8a48"/>
