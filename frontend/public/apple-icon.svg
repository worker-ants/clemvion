<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" role="img" aria-label="Clemvion">
  <title>Clemvion</title>
  <!-- Apple touch icon 180×180. Spec §8.4.1. iOS auto-rounds corners — no rx needed. -->
  <rect width="180" height="180" fill="#eef5ec"/>
  <!-- Scaled 96px mark master, centered with 8% padding (=~14px each side). -->
  <g transform="translate(28 28) scale(1.30)">
    <line x1="48" y1="14" x2="48" y2="82" stroke="#2a7040" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="48" y1="26" x2="26" y2="42" stroke="#3a9a58" stroke-width="2" stroke-linecap="round"/>
    <line x1="48" y1="42" x2="72" y2="30" stroke="#3a9a58" stroke-width="2" stroke-linecap="round"/>
    <line x1="48" y1="58" x2="24" y2="70" stroke="#5ab872" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="48" y1="68" x2="70" y2="76" stroke="#5ab872" stroke-width="1.8" stroke-linecap="round"/>
    <circle cx="48" cy="14" r="5.5" fill="#1a4f2c"/>
    <circle cx="24" cy="42" r="5" fill="#2a8a48"/>
    <circle cx="74" cy="29" r="5" fill="#2a8a48"/>
    <circle cx="22" cy="71" r="4.5" fill="#4ab868"/>
    <circle cx="71" cy="77" r="4.5" fill="#4ab868"/>
    <circle cx="48" cy="83" r="5" fill="#3a9a58"/>
    <circle cx="48" cy="26" r="3.5" fill="#1a4f2c" opacity="0.5"/>
    <circle cx="48" cy="42" r="3.5" fill="#1a4f2c" opacity="0.5"/>
    <circle cx="48" cy="58" r="3.5" fill="#1a4f2c" opacity="0.5"/>
    <circle cx="48" cy="68" r="3.5" fill="#1a4f2c" opacity="0.5"/>
  </g>
</svg>
