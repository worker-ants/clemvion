# clemvion e2e 전용 인프라.
#
# 실행:
#   make e2e-up       # 인프라 + backend-e2e 까지 백그라운드 기동
#   make e2e-test     # backend e2e (supertest) 1-shot
#   make e2e-test-full# backend + playwright 까지
#   make e2e-down     # 정리 (volume·orphan 모두)
#   make e2e-prune    # 모든 clemvion-e2e* worktree 의 stale project 일괄 정리
#
# Project name 격리:
#   - `name:` 키는 의도적으로 두지 않는다. project namespace 는 `Makefile` 이 현재
#     worktree dir basename 으로 도출해 `-p` flag 로 주입한다 (`COMPOSE_PROJECT`).
#   - main worktree (basename=clemvion): `clemvion-e2e` (기존 동작 그대로).
#   - `.claude/worktrees/<task>-<slug>`: `clemvion-e2e-<task>-<slug>`.
#   - 사용자가 `COMPOSE_PROJECT=foo make e2e-test` 로 override 가능.
#   - 효과: 여러 worktree 가 e2e 를 동시에 돌려도 컨테이너·볼륨·network 가 worktree
#     별로 격리. dev compose (project=clemvion) 와도 자동 분리.
#   - 호스트 포트를 노출하지 않으므로 (의도된 설계) 포트 충돌 없음.
#
# Image 캐시 공유:
#   - 빌드 서비스마다 `image:` 를 명시해 image namespace 는 project 와 분리한다.
#     project name 이 바뀌어도 모든 worktree 가 같은 image (예: `clemvion-e2e/backend:latest`)
#     를 공유하므로, 두 번째 worktree 의 첫 e2e 가 image rebuild 비용을 다시 치르지 않는다.
#     container/volume 만 project 별 격리, image 는 공유.
#   - 트레이드오프: 두 worktree 가 동일 image tag 를 거의 동시에 `--build` 하면 마지막
#     build 가 tag 를 차지한다. BuildKit 은 layer 단위 cache 공유로 보통 안전하지만,
#     소스가 다른 두 worktree 가 정말 동시에 빌드를 시작하면 한쪽이 직전 build 결과의
#     image 로 실행될 수 있다. 이슈 의심 시 `make e2e-prune` + `docker image prune` 후
#     순차로 재실행하면 해소된다. 완전 격리가 필요해지면 image 이름에도 project name
#     을 섞을 수 있으나, 그 순간 본 파일의 캐시 공유 이점이 사라진다.
#
# 영속화 없음(ephemeral) — 매 실행마다 깨끗한 schema 가 보장된다.
# runner 서비스는 `profiles: ["test"]` 로 분리되어 `make e2e-up` 만으로는 안 뜬다.

services:
  # ---------------- Infra ----------------
  postgres:
    image: pgvector/pgvector:${POSTGRES_VERSION:-pg18}
    environment:
      POSTGRES_DB: clemvion_e2e
      POSTGRES_USER: clemvion
      POSTGRES_PASSWORD: clemvion-e2e
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clemvion"]
      interval: 3s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10

  minio:
    # W-59 — docker-compose.yml 의 minio 와 동일 release 로 고정.
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    environment:
      MINIO_ROOT_USER: clemvion
      MINIO_ROOT_PASSWORD: clemvion-e2e
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 3s
      timeout: 3s
      retries: 10

  createbuckets:
    # W-59 — docker-compose.yml 의 mc 와 동일 release 로 고정.
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      minio:
        condition: service_healthy
    # 비밀번호의 셸 메타문자 우회를 위해 환경변수 주입 + $$ 이스케이프 (dev compose 와 동일 패턴).
    environment:
      MC_USER: clemvion
      MC_PASS: clemvion-e2e
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 \"$$MC_USER\" \"$$MC_PASS\";
      mc mb local/workflow-storage --ignore-existing;
      exit 0;
      "

  migrate:
    # image 공유 — 헤더의 "Image 캐시 공유" 절 참고.
    image: clemvion-e2e/migrate:latest
    build:
      context: .
      dockerfile: codebase/backend/migrations/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./codebase/backend/migrations:/flyway/sql:ro
    command:
      - migrate
      - -url=jdbc:postgresql://postgres:5432/clemvion_e2e
      - -user=clemvion
      - -password=clemvion-e2e
      - -baselineOnMigrate=true
      - -connectRetries=20
    restart: "no"

  # ---------------- Backend under test ----------------
  # production-like image (target=runner). NODE_ENV 만 test 로 override.
  backend-e2e:
    # image 공유 — 헤더의 "Image 캐시 공유" 절 참고.
    image: clemvion-e2e/backend:latest
    build:
      context: .
      dockerfile: codebase/backend/Dockerfile
      target: runner
    environment:
      NODE_ENV: test
      APP_PORT: "3011"
      APP_URL: http://backend-e2e:3011
      FRONTEND_URL: http://localhost:3012
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USERNAME: clemvion
      DB_PASSWORD: clemvion-e2e
      DB_DATABASE: clemvion_e2e
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: clemvion
      S3_SECRET_KEY: clemvion-e2e
      S3_BUCKET: workflow-storage
      MAIL_TRANSPORT: console
      # e2e 전용 임시 secret. 운영 절대 사용 금지.
      JWT_SECRET: clemvion-e2e-jwt-secret-do-not-use-in-prod-x9y8z7
      JWT_ACCESS_EXPIRATION: "900"
      JWT_REFRESH_EXPIRATION: "604800"
      ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef
      INTEGRATION_ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef
      OAUTH_STUB_MODE: "true"
      # 멀티턴 AI park→재개 e2e(execution-park-resume.e2e-spec.ts) 활성화 — 실제 LLM
      # 키/호출 없이 결정적 stub 클라이언트(LlmService.createClient)로 turn-park(§4.x)·
      # rehydration(§7.5)을 검증한다. 미설정(프로덕션)이면 정상 provider 경로.
      LLM_STUB_MODE: "true"
      # WebAuthn 2FA e2e(webauthn-2fa.e2e-spec.ts) 활성화. 미설정 시 기능이 503 으로
      # 꺼져 suite 가 전부 실패한다. 값은 test/helpers/webauthn.ts 의 RP_ID/RP_ORIGIN 과
      # 반드시 일치해야 한다(불일치 시 origin/rpIdHash 검증 실패).
      WEBAUTHN_RP_ID: localhost
      WEBAUTHN_ORIGIN: http://localhost:3012
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      createbuckets:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully
    healthcheck:
      # global prefix 가 적용되어 실제 경로는 /api/health. alpine 베이스에 wget 기본 포함.
      test: ["CMD", "wget", "-qO-", "http://localhost:3011/api/health"]
      interval: 3s
      timeout: 3s
      retries: 20

  # ---------------- Runners (profile=test) ----------------
  # `make e2e-up` 으로는 안 뜨고, `make e2e-test` / `e2e-test-full` 에서만 기동.
  # 같은 docker network 안이라 hostname `backend-e2e` 로 접근.

  # backend e2e (supertest / HTTP). dev dep + src 가 필요해 deps stage + 호스트 mount.
  backend-e2e-runner:
    # image 공유 — 헤더의 "Image 캐시 공유" 절 참고.
    image: clemvion-e2e/backend-deps:latest
    build:
      context: .
      dockerfile: codebase/backend/Dockerfile
      target: deps
    working_dir: /app/backend
    command: ["npm", "run", "test:e2e"]
    environment:
      E2E_BASE_URL: http://backend-e2e:3011
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USERNAME: clemvion
      DB_PASSWORD: clemvion-e2e
      DB_DATABASE: clemvion_e2e
    volumes:
      # 호스트 backend 소스를 그대로 사용. node_modules 는 anonymous volume 으로
      # 가려서 deps stage 가 설치한 dev dep 가 호스트의 (잠재적으로 부재한) node_modules
      # 로 덮어씌워지지 않도록 한다.
      - ./codebase/backend:/app/backend
      - /app/backend/node_modules
    depends_on:
      backend-e2e:
        condition: service_healthy
    profiles: ["test"]

  # frontend playwright. 본 spec 들은 page.route 로 backend 호출을 mock 해 backend
  # 의존성이 없다 (backend e2e 가 별도로 통신 정합성을 보장). dev 서버는
  # playwright.config 의 webServer 가 자동으로 띄운다.
  playwright-runner:
    # W-58 — frontend package.json 의 @playwright/test ^1.59 과 동일 major.minor
    # 로 정렬. browser binary / Node modules 간 호환성을 보장한다.
    image: mcr.microsoft.com/playwright:v1.59.1-jammy
    working_dir: /app/frontend
    volumes:
      - ./codebase/frontend:/app/frontend
      - /app/frontend/node_modules
    command:
      - sh
      - -c
      - "npm ci && npx playwright install --with-deps chromium && npm run e2e"
    environment:
      CI: "true"
      PLAYWRIGHT_BASE_URL: http://localhost:3012
    profiles: ["test"]
