<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Clemvion Web Chat — 스니펫 임베드 예제</title>
  </head>
  <body>
    <main style="max-width: 640px; margin: 40px auto; font-family: system-ui">
      <h1>스니펫 임베드 예제 (M1 Hosted)</h1>
      <p>아래 두 &lt;script&gt; 블록만 페이지에 붙여넣으면 우하단에 위젯이 뜹니다.</p>
      <button id="open">프로그래matic open()</button>
    </main>

    <!-- 1) 로더 비동기 로드 + 큐 스텁(boot 전 호출 버퍼링) -->
    <script>
      (function (d, s) {
        // 큐 스텁: loader.js 로드 전 ClemvionChat 호출을 버퍼링.
        window.ClemvionChat =
          window.ClemvionChat ||
          function () {
            (window.ClemvionChat.q = window.ClemvionChat.q || []).push(arguments);
          };
        var j = d.createElement(s);
        j.async = 1;
        // <widget-cdn-base> 는 배포 환경 값(0-architecture §4). 예시는 로컬.
        j.src = "https://<widget-cdn-base>/web-chat/v1/loader.js";
        d.head.appendChild(j);
      })(document, "script");
    </script>

    <!-- 2) boot -->
    <script>
      ClemvionChat("boot", {
        apiBase: "https://<api-base>",
        triggerEndpointPath: "REPLACE_WITH_PUBLIC_WEBHOOK_PATH",
        locale: "ko",
        appearance: { primaryColor: "#5B4FE9", position: "bottom-right" },
        headerTitle: "AI 어시스턴트",
        welcome: {
          text: "안녕하세요! 무엇을 도와드릴까요?",
          suggestions: ["제품 소개를 받아볼 수 있나요?", "설치는 어떻게 하나요?"],
        },
        disclaimer: "AI는 한정된 데이터로 동작하며, 중요한 정보는 추가 확인이 필요합니다.",
      });

      // 이벤트 구독 / 프로그래matic 제어
      ClemvionChat("on", "message", function (m) {
        console.log("[host] chat message", m);
      });
      document.getElementById("open").addEventListener("click", function () {
        ClemvionChat("open");
      });
    </script>
  </body>
</html>
