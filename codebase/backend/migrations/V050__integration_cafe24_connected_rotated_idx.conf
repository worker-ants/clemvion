# PostgreSQL 의 `CREATE INDEX CONCURRENTLY` 는 단일 트랜잭션 안에서 실행할 수
# 없다 (`ERROR: CREATE INDEX CONCURRENTLY cannot run inside a transaction
# block`). Flyway 는 기본적으로 한 마이그레이션 SQL 전체를 하나의 트랜잭션으로
# 감싸므로, 본 옵션으로 그 감싸기를 끄고 PostgreSQL 이 인덱스 빌드 전용 내부
# 트랜잭션을 직접 관리하게 한다. CONCURRENTLY 자체는 운영 테이블에 대한 쓰기
# 잠금 시간을 최소화하기 위한 선택이다 (`V050__*.sql` 본문 주석 참조).
#
# **실패 시 복구 절차** — `CREATE INDEX CONCURRENTLY` 가 도중에 실패하면
# PostgreSQL 에 `INVALID` 상태의 인덱스 잔류가 발생할 수 있다
# (`pg_index.indisvalid = false`). 이 경우 Flyway 는 마이그레이션을 `failed`
# 로 마킹하지만 잔존 인덱스를 자동 제거하지 않는다. 다음 순서로 수동 복구:
#   1. `\d+ integration` 으로 INVALID 인덱스 이름 확인 (이 마이그레이션은
#      `idx_integration_cafe24_connected_rotated` 를 만든다).
#   2. `DROP INDEX CONCURRENTLY IF EXISTS idx_integration_cafe24_connected_rotated;`
#      를 별도 세션에서 실행 (DROP 역시 CONCURRENTLY 권장 — 쓰기 잠금 최소화).
#   3. `flyway repair` 로 schema_history 상태 초기화.
#   4. 마이그레이션 재실행 (`flyway migrate`).
executeInTransaction=false
