# pnpm workspace 정의 — 모노레포 단일 lockfile(pnpm-lock.yaml)의 앵커.
# 내부 패키지는 file:../packages/* 대신 workspace:* 프로토콜로 참조된다.
# .claude/tools/mermaid-lint 은 하니스 전용 독립 도구라 workspace 에 포함하지 않는다(자체 npm lockfile 유지).
packages:
  - "codebase/backend"
  - "codebase/frontend"
  - "codebase/channel-web-chat"
  - "codebase/packages/*"

# backend `pnpm deploy`(non-legacy)가 요구하는 설정(ERR_PNPM_DEPLOY_NONINJECTED_WORKSPACE).
# 이 값 덕에 deploy 산출물이 내부 @workflow/* 를 injected copy 로 격리해 패키지별 버전을
# 올바로 해소한다(legacy flat deploy 의 direct→transitive collapse 회피).
# 실측: 일반 `pnpm install`(frozen) 의 워크스페이스 링크는 여전히 **symlink** 다 —
# backend·frontend·web-chat-sdk 모두 node_modules/@workflow/* 가 codebase/packages/* 로의
# symlink 로 유지됨을 확인. 즉 dev hot-reload·frontend next.config 의 symlink 전제는 불변이고,
# node-linker 도 hoisted 유지라 Next standalone·native 위험 없음. 실효 영향은 `pnpm deploy` 한정.
injectWorkspacePackages: true

# 보안 취약점 해소용 전이 의존성 상향 핀 (pnpm 10 정규 위치 — 이전에는 package.json 의
# `pnpm.overrides` 였으나 pnpm 10.23 이 그 필드를 더 이상 읽지 않아 여기로 이전). pnpm
# overrides 는 workspace-global 이므로 패키지별 충돌 항목은 버전-레인지로 스코프한다.
# undici 는 backend=direct ^6, frontend=transitive 취약 7.x 라 7.x 취약범위만 스코프
# (backend 6.x 불변). next>postcss 는 frontend·channel-web-chat 공통. 각 CVE 사유는
# audit 커밋(b2bbb49e) 참조.
overrides:
  lodash: ^4.18.0
  picomatch: ^4.0.4
  liquidjs: ^10.27.0
  ip-address: ^10.2.0
  express-rate-limit: ^8.5.1
  protobufjs: ^7.6.3
  fast-uri: ^3.1.2
  hono: ^4.12.21
  uuid: ^13.0.2
  ws: ^8.21.0
  "@grpc/grpc-js": ^1.14.4
  multer: ^2.2.0
  form-data: ^4.0.6
  nodemailer: ^9.0.1
  next>postcss: ^8.5.14
  eslint-plugin-react-hooks: 7.0.1
  "undici@>=7.0.0 <7.28.0": ^7.28.0
  vite: ^8.0.16
  "@babel/core": ^7.29.7
  # swagger-pin: 마이그레이션 버전 중립성 유지 — 11.2.7 고정. backend/src/common/swagger/
  # api-wrapped.ts 가 `@nestjs/swagger/dist/interfaces/open-api-spec.interface`(SchemaObject)
  # deep-import 을 쓰는데 11.4.x 의 `exports` 가 이 내부 경로를 차단(공개 re-export 없음).
  # deep-import 공개경로 교체 + 핀 제거는 별도 정리 PR(§2)로 분리.
  "@nestjs/swagger": 11.2.7

# pnpm v10 은 lifecycle(build) script 를 기본 차단한다 (pnpm 10 정규 위치 — package.json
# `pnpm.onlyBuiltDependencies` 에서 이전). 네이티브/바이너리 빌드가 필요한 패키지만 허용.
# 설치 시 'Ignored build scripts' 경고로 추가 항목을 발견하면 보충한다.
onlyBuiltDependencies:
  - isolated-vm
  - bcrypt
  - esbuild
  - "@swc/core"
  - "@tailwindcss/oxide"
