# pnpm workspace 정의 — 모노레포 단일 lockfile(pnpm-lock.yaml)의 앵커.
# 내부 패키지는 file:../packages/* 대신 workspace:* 프로토콜로 참조된다.
# .claude/tools/mermaid-lint 은 하니스 전용 독립 도구라 workspace 에 포함하지 않는다(자체 npm lockfile 유지).
packages:
  - "codebase/backend"
  - "codebase/frontend"
  - "codebase/channel-web-chat"
  - "codebase/packages/*"

# backend `pnpm deploy`(non-legacy)가 요구하는 설정(ERR_PNPM_DEPLOY_NONINJECTED_WORKSPACE).
# 이 값 덕에 deploy 산출물이 내부 @workflow/* 를 injected copy 로 격리해 패키지별 버전을
# 올바로 해소한다(legacy flat deploy 의 direct→transitive collapse 회피).
# 실측: 일반 `pnpm install`(frozen) 의 워크스페이스 링크는 여전히 **symlink** 다 —
# backend·frontend·web-chat-sdk 모두 node_modules/@workflow/* 가 codebase/packages/* 로의
# symlink 로 유지됨을 확인. 즉 dev hot-reload·frontend next.config 의 symlink 전제는 불변이고,
# node-linker 도 hoisted 유지라 Next standalone·native 위험 없음. 실효 영향은 `pnpm deploy` 한정.
injectWorkspacePackages: true
