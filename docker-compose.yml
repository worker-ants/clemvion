services:
  postgres:
    image: pgvector/pgvector:${POSTGRES_VERSION:-pg18}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  createbuckets:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      mc mb local/workflow-storage --ignore-existing;
      exit 0;
      "

  # ---------------- App stack (opt-in via `--profile app`) ----------------
  # `docker compose --profile app up` 으로만 기동. profile 없는 `docker compose up`
  # 은 인프라(postgres/redis/minio/createbuckets)만 띄워 host-mode dev와 호환.

  migrate:
    profiles: ["app"]
    build:
      context: .
      dockerfile: backend/migrations/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    # Dockerfile 의 COPY 는 K8s/CI 이미지 빌드용으로 유지하고, compose 에서는
    # 호스트 backend/migrations 를 그대로 노출시켜 새 V###__*.sql/.conf 추가 시
    # 이미지 재빌드 없이 즉시 반영되도록 한다. Flyway 기본 location 이 /flyway/sql
    # 이므로 별도 -locations 플래그 불필요. SQL 디렉터리에는 쓰지 않으므로 :ro.
    volumes:
      - ./backend/migrations:/flyway/sql:ro
    # 배열 형태: 셸 파싱을 거치지 않으므로 JDBC URL의 ':' / '=' 가 안전.
    command:
      - migrate
      - -url=jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      - -user=${POSTGRES_USER}
      - -password=${POSTGRES_PASSWORD}
      - -baselineOnMigrate=true
      - -connectRetries=20
    restart: "no"

  backend:
    profiles: ["app"]
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: deps
    working_dir: /app/backend
    command: ["npm", "run", "start:dev"]
    env_file:
      - ./backend/.env
    # @nestjs/config 는 process.env 에 이미 있는 키를 덮어쓰지 않으므로,
    # 여기 environment 가 backend/.env 의 동명 키를 항상 이긴다.
    environment:
      NODE_ENV: development
      APP_PORT: "3011"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_DATABASE: ${POSTGRES_DB}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET: workflow-storage
      # macOS Docker Desktop 의 bind-mount 는 inotify 가 100% 신뢰되지 않아 폴링 활성화.
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "500"
    ports:
      - "3011:3011"
    volumes:
      - ./backend:/app/backend
      - backend_node_modules:/app/backend/node_modules
      - backend_dist:/app/backend/dist
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      createbuckets:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully

  frontend:
    profiles: ["app"]
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: deps
    working_dir: /app/frontend
    # package.json 의 `dev` 는 `source .env 2>/dev/null; next dev …` 형태이므로
    # 컨테이너에 주입할 값은 host frontend/.env 에 직접 작성한다.
    # (compose `environment:` 로 줘도 `source` 가 덮어쓸 수 있음 — 폴링 변수만 예외적으로 둠)
    command: ["npm", "run", "dev"]
    env_file:
      - ./frontend/.env
    environment:
      WATCHPACK_POLLING: "true"
    ports:
      - "3012:3012"
    volumes:
      - ./frontend:/app/frontend
      - frontend_node_modules:/app/frontend/node_modules
      - frontend_next:/app/frontend/.next
    depends_on:
      backend:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
  minio_data:
  backend_node_modules:
  backend_dist:
  frontend_node_modules:
  frontend_next:
