apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  labels:
    app.kubernetes.io/name: clemvion
    app.kubernetes.io/component: backend
data:
  NODE_ENV: "production"
  APP_PORT: "3011"
  # 환경별 overlay에서 patch (codebase/frontend/backend host 분리)
  APP_URL: "https://api.example.com"
  FRONTEND_URL: "https://app.example.com"

  # Database (password는 Secret)
  DB_HOST: "postgres"
  DB_PORT: "5432"
  DB_DATABASE: "workflow"

  # Redis
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"

  # S3 / MinIO (access/secret key는 Secret)
  S3_ENDPOINT: "http://minio:9000"
  S3_BUCKET: "workflow-storage"
  S3_REGION: "us-east-1"

  # JWT (secret 자체는 Secret)
  JWT_ACCESS_EXPIRATION: "15m"
  JWT_REFRESH_EXPIRATION: "7d"

  # Mail (dev는 console, prod는 smtp + Secret)
  MAIL_TRANSPORT: "console"

  # OAuth — 운영에서는 false 고정 (true면 부트스트랩이 거부)
  OAUTH_STUB_MODE: "false"

  # Engine 튜닝
  WORKER_CONCURRENCY: "4"
  PARALLEL_ENGINE: "off"
  MAX_NODE_ITERATIONS: "100"

  # SSRF guard (HTTP Request / DB Query 노드)
  # true 면 loopback/RFC 1918/link-local 등 차단 해제. 내부 DB·on-prem API 호출이
  # 필요한 self-hosted 배포에서만 의식적으로 true (외부 egress 방화벽 전제).
  ALLOW_PRIVATE_HOST_TARGETS: "false"

  # OpenTelemetry (옵셔널)
  OTEL_ENABLED: "false"
  OTEL_SERVICE_NAME: "clemvion-backend"

  # Health probe 로그 게이팅.
  # false(기본): 프로브 성공 로그 억제 (노이즈 감소).
  # true 로 설정하면 /api/health, /api/health/live 성공 요청도 로그에 남김.
  HEALTH_CHECK_LOG: "false"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-config
  labels:
    app.kubernetes.io/name: clemvion
    app.kubernetes.io/component: frontend
data:
  NODE_ENV: "production"
  # Server Component fetch 시 우선 사용. 클러스터 내부 DNS.
  INTERNAL_API_URL: "http://backend:3011/api"
