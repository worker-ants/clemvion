apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  labels:
    app.kubernetes.io/name: clemvion
    app.kubernetes.io/component: backend
data:
  NODE_ENV: "production"
  APP_PORT: "3011"
  # 환경별 overlay에서 patch (frontend/backend host 분리)
  APP_URL: "https://api.example.com"
  FRONTEND_URL: "https://app.example.com"

  # Database (password는 Secret)
  DB_HOST: "postgres"
  DB_PORT: "5432"
  DB_DATABASE: "workflow"

  # Redis
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"

  # S3 / MinIO (access/secret key는 Secret)
  S3_ENDPOINT: "http://minio:9000"
  S3_BUCKET: "workflow-storage"
  S3_REGION: "us-east-1"

  # JWT (secret 자체는 Secret)
  JWT_ACCESS_EXPIRATION: "15m"
  JWT_REFRESH_EXPIRATION: "7d"

  # Mail (dev는 console, prod는 smtp + Secret)
  MAIL_TRANSPORT: "console"

  # OAuth — 운영에서는 false 고정 (true면 부트스트랩이 거부)
  OAUTH_STUB_MODE: "false"

  # Engine 튜닝
  WORKER_CONCURRENCY: "4"
  PARALLEL_ENGINE: "off"
  MAX_NODE_ITERATIONS: "100"

  # OpenTelemetry (옵셔널)
  OTEL_ENABLED: "false"
  OTEL_SERVICE_NAME: "clemvion-backend"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-config
  labels:
    app.kubernetes.io/name: clemvion
    app.kubernetes.io/component: frontend
data:
  NODE_ENV: "production"
  # Server Component fetch 시 우선 사용. 클러스터 내부 DNS.
  INTERNAL_API_URL: "http://backend:3011/api"
