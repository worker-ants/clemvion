# 본 파일은 Secret 의 키 스키마만 정의한 예시입니다.
# 실 환경에서는 SealedSecrets 또는 external-secrets-operator로 동등한 이름의 Secret을 생성하세요.
# - kubeseal 사용 시: 이 파일을 시작점으로 실 값을 채운 뒤 `kubeseal` 로 봉인.
# - external-secrets 사용 시: ExternalSecret CR이 본 Secret 이름(`backend-secret`)을 생성하도록 매핑.
#
# 절대 실 값을 그대로 commit 하지 마세요.
apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  labels:
    app.kubernetes.io/name: clemvion
    app.kubernetes.io/component: backend
type: Opaque
stringData:
  # Database
  DB_USERNAME: "REPLACE_ME"
  DB_PASSWORD: "REPLACE_ME"

  # JWT
  JWT_SECRET: "REPLACE_ME_AT_LEAST_32_BYTES"

  # S3 / MinIO
  S3_ACCESS_KEY: "REPLACE_ME"
  S3_SECRET_KEY: "REPLACE_ME"

  # Encryption
  ENCRYPTION_KEY: "REPLACE_ME_32_BYTE_HEX"
  INTEGRATION_ENCRYPTION_KEY: "REPLACE_ME"

  # Mail (MAIL_TRANSPORT=smtp 일 때만)
  MAIL_HOST: ""
  MAIL_PORT: ""
  MAIL_SECURE: ""
  MAIL_USER: ""
  MAIL_PASS: ""
  MAIL_FROM: ""

  # OAuth (OAUTH_STUB_MODE=false 일 때 사용)
  GOOGLE_CLIENT_ID: ""
  GOOGLE_CLIENT_SECRET: ""
  GITHUB_CLIENT_ID: ""
  GITHUB_CLIENT_SECRET: ""
  SLACK_CLIENT_ID: ""
  SLACK_CLIENT_SECRET: ""
