apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: idea-workflow

labels:
  - pairs:
      app.kubernetes.io/name: idea-workflow
      app.kubernetes.io/part-of: idea-workflow
    includeSelectors: false

resources:
  - namespace.yaml
  - configmap.yaml
  - secret.example.yaml
  - migrate-job.yaml
  - backend-deployment.yaml
  - backend-service.yaml
  - frontend-deployment.yaml
  - frontend-service.yaml
  - ingress.yaml

images:
  - name: idea-workflow/backend
    newTag: latest
  - name: idea-workflow/frontend
    newTag: latest
  - name: idea-workflow/migrate
    newTag: latest
