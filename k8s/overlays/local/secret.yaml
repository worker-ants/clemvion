# 로컬 개발 전용 — 절대 staging/prod 에 적용하지 마세요.
# base/secret.example.yaml 의 placeholder 를 채운 dev seed 값.
apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
type: Opaque
stringData:
  DB_USERNAME: "postgres"
  DB_PASSWORD: "postgres"

  JWT_SECRET: "local-dev-jwt-secret-change-me-32-bytes-minimum"

  S3_ACCESS_KEY: "minioadmin"
  S3_SECRET_KEY: "minioadmin123"

  ENCRYPTION_KEY: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
  INTEGRATION_ENCRYPTION_KEY: "local-integration-key"

  MAIL_USER: ""
  MAIL_PASS: ""

  GOOGLE_CLIENT_ID: ""
  GOOGLE_CLIENT_SECRET: ""
  GITHUB_CLIENT_ID: ""
  GITHUB_CLIENT_SECRET: ""
  SLACK_CLIENT_ID: ""
  SLACK_CLIENT_SECRET: ""
