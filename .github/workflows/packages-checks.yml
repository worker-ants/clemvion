# 내부 backend-공유 패키지(@workflow/expression-engine·graph-warning-rules·node-summary·
# chat-channel-validation)의 lint/test/build CI 가드. 종전 이 4개는 전용 CI job 이 없어
# (backend 전용 워크플로 부재) 회귀가 PR 에서 안 잡혔다. eia-context-followups #3 — eslint config
# 신설(각 패키지 eslint.config.mjs)로 lint 가 실효화되면서 CI 배선.
#
# 모집단 = `codebase/backend/package.json` 의 `@workflow/*` 의존(= backend-공유). 아래 3개 손 목록
# (pull_request.paths · push.paths · matrix.pkg)이 그 집합과 어긋나면 red:
#   codebase/frontend/src/lib/repo-guards/__tests__/internal-package-registration.test.ts
# 그 가드는 로컬 `run-test.sh unit` 에서 돈다 — 본 워크플로 자신은 repo 레벨에서 Actions 가 꺼져
# 있어 현재 실행되지 않으므로(런 수 0), 여기에 CI job 으로 넣으면 가드가 안 도는 자기모순이 된다.
name: packages-checks

on:
  pull_request:
    paths:
      - 'codebase/packages/ai-end-reason/**'
      - 'codebase/packages/expression-engine/**'
      - 'codebase/packages/graph-warning-rules/**'
      - 'codebase/packages/node-summary/**'
      - 'codebase/packages/chat-channel-validation/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/packages-checks.yml'
  push:
    branches: [main]
    paths:
      - 'codebase/packages/ai-end-reason/**'
      - 'codebase/packages/expression-engine/**'
      - 'codebase/packages/graph-warning-rules/**'
      - 'codebase/packages/node-summary/**'
      - 'codebase/packages/chat-channel-validation/**'
      - 'pnpm-lock.yaml'

concurrency:
  group: packages-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 패키지별 독립 job(matrix) — web-chat-checks.yml 패턴과 통일. fail-fast:false 로 한 패키지가
  # 깨져도 나머지의 실패 신호가 은폐되지 않는다(단일 job 순차 run 의 set -e 문제 회피).
  packages:
    name: ${{ matrix.pkg }} (lint/test/build)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        pkg:
          - '@workflow/ai-end-reason'
          - '@workflow/expression-engine'
          - '@workflow/graph-warning-rules'
          - '@workflow/node-summary'
          - '@workflow/chat-channel-validation'
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml
      - name: Install deps
        run: pnpm install --frozen-lockfile --filter "${{ matrix.pkg }}..."
      - name: Lint
        run: pnpm --filter "${{ matrix.pkg }}" lint
      - name: Test (jest)
        run: pnpm --filter "${{ matrix.pkg }}" test
      - name: Build (tsc)
        run: pnpm --filter "${{ matrix.pkg }}" build
