# e2e (backend + frontend) — docker-compose.e2e.yml 기반 격리 환경.
#
# `make e2e-test` 가 backend e2e (supertest HTTP), `make e2e-test-full` 이
# frontend playwright 까지 실행한다. 실패 시 logs / playwright trace 를 artifact 로.

name: e2e

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Cache Docker layers
        uses: actions/cache@v5
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('backend/Dockerfile', 'backend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build backend image
        run: docker compose -f docker-compose.e2e.yml build backend-e2e backend-e2e-runner

      - name: Run backend e2e (supertest HTTP)
        run: make e2e-test

      - name: Collect docker logs on failure
        if: failure()
        run: |
          mkdir -p artifacts/logs
          docker compose -f docker-compose.e2e.yml logs > artifacts/logs/compose.log 2>&1 || true
          docker compose -f docker-compose.e2e.yml ps >> artifacts/logs/compose.log 2>&1 || true

      - name: Upload artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-failure-logs
          path: artifacts/
          retention-days: 7

  e2e-frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - name: Run frontend playwright (mocked backend)
        run: make e2e-test-full

      - name: Upload playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
