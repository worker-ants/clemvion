# e2e (backend + frontend) — docker-compose.e2e.yml 기반 격리 환경.
#
# `make e2e-test` 가 backend e2e (supertest HTTP), `make e2e-test-full` 이
# frontend playwright 까지 실행한다. 실패 시 logs / playwright trace 를 artifact 로.

name: e2e

# paths-ignore mirrors PROJECT.md §e2e 면제 화이트리스트. `.github/**` was missing
# here, so a CI-definition-only change still burned a full e2e run even though the
# whitelist exempts it ("CI 정의는 e2e 가 검증 대상 아님").
#
# Adding it costs one thing: a PR that edits THIS file no longer triggers e2e, so a
# broken workflow would surface only on the next code PR. `workflow_dispatch` below
# is the escape hatch — run e2e manually from the Actions tab when changing e2e.yml
# itself. (A `!` negation pattern could carve this file back out instead, but the
# ordering rules make that easy to get subtly wrong; an explicit manual trigger is
# the more legible trade.)
on:
  push:
    branches: [main]
    paths-ignore:
      - '.claude/**'
      - '.github/**'
      - 'spec/**'
      - 'plan/**'
      - 'review/**'
      - '*.md'
  pull_request:
    paths-ignore:
      - '.claude/**'
      - '.github/**'
      - 'spec/**'
      - 'plan/**'
      - 'review/**'
      - '*.md'
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 빠른 preflight — playwright base 이미지 태그 ↔ @playwright/test 해소 버전,
  # frontend @workflow 클로저 ↔ Dockerfile COPY ↔ compose 볼륨 마스킹 정합을 정적으로
  # 검증한다(수동 동기화 목록의 silent drift 차단). 아래 e2e job 들이 needs 로 걸어 두어
  # 설정이 어긋난 채로 30분짜리 e2e 를 낭비하지 않고 fail-fast 한다.
  config-guard:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: '3.x'
      - name: Check e2e playwright/config alignment
        run: python3 scripts/check-e2e-playwright-config.py

  e2e:
    needs: config-guard
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Cache Docker layers
        uses: actions/cache@v6
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('codebase/backend/Dockerfile', 'pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build backend image
        run: docker compose -f docker-compose.e2e.yml build backend-e2e backend-e2e-runner

      - name: Run backend e2e (supertest HTTP)
        run: make e2e-test

      - name: Collect docker logs on failure
        if: failure()
        run: |
          mkdir -p artifacts/logs
          docker compose -f docker-compose.e2e.yml logs > artifacts/logs/compose.log 2>&1 || true
          docker compose -f docker-compose.e2e.yml ps >> artifacts/logs/compose.log 2>&1 || true

      - name: Upload artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-failure-logs
          path: artifacts/
          retention-days: 7

  e2e-frontend:
    needs: config-guard
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - name: Run frontend playwright (mocked backend)
        run: make e2e-test-full

      # retry(재시도)로 통과한 flaky 테스트는 exit 0(green)이라 그냥 묻힌다. json 리포트를
      # 파싱해 step summary + ::warning:: 로 노출한다(비차단 — 항상 exit 0). always() 라
      # 위 e2e 실패 시에도 flaky 정보를 함께 남긴다. (plan: e2e-retry-visibility-followup)
      - name: Surface flaky (retry-passed) tests
        if: always()
        # 스크립트가 이미 항상 exit 0 이지만, 예상 밖 상황(python 부재 등)에도 이 관측용 step 이
        # job 결론을 뒤집지 않도록 이중 방어.
        continue-on-error: true
        run: python3 scripts/report_playwright_flaky.py codebase/frontend/playwright-report/results.json

      - name: Upload playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: codebase/frontend/playwright-report/
          retention-days: 7
