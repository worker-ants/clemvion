# Harness self-tests — guards the `.claude/` automation layer (hooks, skill
# libs, agent registry) that has no other coverage. Stdlib-only `unittest`, no
# install step. Policy/intent: `.claude/tests/README.md`.

name: harness-checks

on:
  pull_request:
    paths:
      - '.claude/agents/**'
      # slash-command 정의도 sub-agent 계약 문구를 담아 test_summary_agent_contract.py 의
      # 검증 대상이다 — paths 에 없으면 이 파일들만 고친 PR 에서 스위트가 아예 안 돌았다.
      - '.claude/commands/**'
      # doc-sync-matrix.json 은 test_doc_sync_matrix.py 가 PROJECT.md 매트릭스와
      # 대조하는데, paths 에 없어 그 JSON 만 고친 PR 에서 가드가 안 돌았다 — 위 항목들과
      # 동일한 실패 클래스의 6번째. test_harness_checks_paths_coverage.py 가 이제 등재를 강제한다.
      - '.claude/config/**'
      - '.claude/hooks/**'
      # .githooks/pre-commit 은 ConsumerBindingTest(test_mermaid_lint_ready.py)로
      # 결속되는데 paths 에 없으면 그 파일 단독 수정 시 정작 자신을 지키는 테스트가
      # 트리거되지 않았다 — 아래 .claude/_shared 항목과 동일한 실패 클래스(00_59_56 W3).
      - '.githooks/**'
      # 게이트(review_guard)·오케스트레이터 CLI 가 공유하는 report-path SoT. 단독 수정이
      # CI 를 안 태우면 이 PR 이 없애려던 "drift 가 조용히 재발" 클래스 그 자체가 된다.
      - '.claude/_shared/**'
      - '.claude/skills/**'
      - '.claude/tests/**'
      - '.claude/tools/**'
      # Workflow 스크립트는 BLOCK/RISK 판정 로직을 담는데 종전 paths 에 없어, 단독 수정 시
      # 가드(test_workflow_scripts.py: 문법 + shared-block drift)가 트리거되지 않았다.
      - '.claude/workflows/**'
      - '.claude.project.json'
      - 'PROJECT.md'
      - '.github/workflows/harness-checks.yml'
      # test_dependabot_npm_coverage.py 가 이 둘을 대조해 "pnpm 워크스페이스 밖 npm 트리는
      # 반드시 dependabot 에 등록" 불변식을 지킨다. paths 에 없으면 등록을 지우거나 워크스페이스
      # 범위를 바꾼 PR 에서 정작 그걸 지키는 가드가 안 돈다 — 위 .githooks/** · .claude/_shared/**
      # 와 동일한 실패 클래스.
      - '.github/dependabot.yml'
      # test_e2e_exemption_paths_sync.py 가 이 워크플로의 paths-ignore 를 PROJECT.md §e2e
      # 면제 화이트리스트와 대조한다. paths 에 없으면 **paths-ignore 를 넓히는 PR**(정확히
      # 그 가드가 막으려는 위험 방향)이 e2e.yml 만 건드릴 때 가드가 안 돈다 — 위
      # .githooks/** · .claude/_shared/** · dependabot.yml 과 동일한 실패 클래스.
      - '.github/workflows/e2e.yml'
      - 'pnpm-workspace.yaml'
      # scripts/ 중 harness unittest 가 커버하는 것은 명시 등재 — 테스트 없이 단독 수정돼도
      # 회귀 테스트가 트리거되도록 (cf. migration-check.yml 의 check-migration-versions.py).
      - 'scripts/report_playwright_flaky.py'
      - 'scripts/check-e2e-playwright-config.py'

concurrency:
  group: harness-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unittest:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7

      # ubuntu-latest ships python3, but pin via setup-python to keep the
      # actions major policy consistent with the other workflows (v5/v6 line).
      - uses: actions/setup-python@v7
        with:
          python-version: '3.x'

      - name: Run harness unit tests
        run: python3 -m unittest discover -s .claude/tests -p 'test_*.py'

      # The workflow scripts' report-return parsing decides BLOCK/RISK, so it gets real
      # unit tests. They are `.mjs` (node:test) because the logic is JS — the unittest
      # discovery above only picks up `test_*.py`, so this needs its own step.
      # 24, matching every other workflow. This one sat on 22 with no recorded
      # reason, so a reader had to assume the difference was load-bearing
      # (harness-guard-followups §A W8). Nothing here needs the older line:
      # `node --test` and the ESM the workflow scripts use predate both.
      - uses: actions/setup-node@v7
        with:
          node-version: '24'

      - name: Run workflow contract unit tests
        run: node --test .claude/tests/test_agent_return.mjs
