# Web-chat 위젯 SPA(channel-web-chat) + SDK(packages/web-chat-sdk) 단위 테스트 + build 가드.
#
# 두 패키지는 backend/frontend 의 workspace 의존 그래프에 묶이지 않은 독립 패키지라
# frontend-checks.yml 의 설치 흐름이 커버하지 못한다. 본 워크플로가 각 패키지를
# pnpm --filter 로 독립 설치하고 lint/unit/build 를 실행해 회귀를 조기 차단한다.
# (e2e.yml 과 분리 — 두 패키지만 변할 때 빠르게 fail 하도록.)

name: web-chat-checks

on:
  pull_request:
    paths:
      - 'codebase/channel-web-chat/**'
      - 'codebase/packages/web-chat-sdk/**'
      - 'codebase/packages/sdk/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/web-chat-checks.yml'
  push:
    branches: [main]
    paths:
      - 'codebase/channel-web-chat/**'
      - 'codebase/packages/web-chat-sdk/**'
      - 'codebase/packages/sdk/**'
      - 'pnpm-lock.yaml'

concurrency:
  group: web-chat-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sdk:
    # 패키지 dir 은 packages/web-chat-sdk 이지만 package name 은 @workflow/web-chat.
    name: web-chat-sdk (lint/test/build)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml
      - name: Install deps
        run: pnpm install --frozen-lockfile --filter "@workflow/web-chat..."
      - name: Lint
        run: pnpm --filter @workflow/web-chat lint
      - name: Typecheck
        run: pnpm --filter @workflow/web-chat typecheck
      - name: Jest (unit)
        run: pnpm --filter @workflow/web-chat test
      - name: Build (tsc + loader IIFE)
        run: pnpm --filter @workflow/web-chat build

  widget:
    name: channel-web-chat (lint/test/build)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml
      - name: Install deps
        run: pnpm install --frozen-lockfile --filter "channel-web-chat..."
      - name: Lint
        run: pnpm --filter channel-web-chat lint
      # 타입 가드(위젯 eia-events.test.ts 의 @ts-expect-error negative·WaitingContext
      # 캐스트-free 컴파일)는 이 step 이 담당한다 — vitest 는 esbuild 로 타입을 strip 하고,
      # 아래 next build 는 앱 module graph 만 걸어 standalone *.test.ts 를 typecheck 하지 않는다.
      - name: Typecheck
        run: pnpm --filter channel-web-chat typecheck
      - name: Vitest (unit)
        run: pnpm --filter channel-web-chat test
      # next build (static export) — 위젯 SPA prerender 검증(타입 검증은 위 Typecheck step).
      - name: Next build (static export)
        run: pnpm --filter channel-web-chat build

  sdk-client:
    # packages/sdk (@workflow/sdk) — EIA client SDK. web-chat-checks paths 에
    # packages/sdk/** 가 있으나 이를 도는 job 이 없던 갭을 메운다(PR #912 후속).
    name: '@workflow/sdk (test/build)'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml
      - name: Install deps
        run: pnpm install --frozen-lockfile --filter "@workflow/sdk..."
      # test(ts-jest)가 타입 가드(client.spec.ts 의 @ts-expect-error negative)를 검증한다 —
      # build(tsc)는 tsconfig 가 *.spec.ts 를 exclude 하므로 spec 을 안 본다.
      - name: Lint
        run: pnpm --filter @workflow/sdk lint
      - name: Jest (unit + type guard)
        run: pnpm --filter @workflow/sdk test
      - name: Build (tsc)
        run: pnpm --filter @workflow/sdk build
