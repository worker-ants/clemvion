# Flyway 마이그레이션 V번호 가드.
#
# 여러 PR 이 병렬로 진행될 때 같은 V번호 점유 / main 의 max(V) 보다 작거나
# 같은 번호 / gap / .conf 페어 불일치를 PR 단계에서 fail-fast 로 검출한다.
# 정책 본문은 `spec/conventions/migrations.md`.
#
# merge race (CI 통과 후 다른 PR 이 먼저 머지되어 base max 가 추월되는 경우)
# 는 본 워크플로 단독으로는 막을 수 없다. 본 repo 는 무료 플랜의 private
# 저장소여서 branch protection 의 "Require branches to be up to date" 옵션이
# 동작하지 않으므로, §6.2 의 작성자 책임 규약 + §6.3 의
# migration-recheck-on-main 사후 안전망으로 보완한다. 정책 본문은
# spec/conventions/migrations.md §6.2 / §6.3 / §7 대안 4.

name: migration-check

on:
  pull_request:
    paths:
      - 'codebase/backend/migrations/**'
      - 'scripts/check-migration-versions.py'
      - '.github/workflows/migration-check.yml'

concurrency:
  group: migration-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  guard:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      # base ref (보통 main) 와의 merge-base 를 계산하려면 전체 히스토리가 필요.
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # ubuntu-latest 에 이미 python3 가 있지만, 명시적 setup 으로 다른
      # workflow 와 actions 메이저 정책을 일관 유지한다 (v5/v6 라인).
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      # base_ref 는 PR 컨텍스트에서만 채워진다. actions/checkout 이 origin
      # 을 자동 설정하지만, base 브랜치 ref 를 fetch 해야 origin/<base> 로
      # 비교할 수 있다.
      - name: Fetch base ref
        # actions/checkout@v5 의 fetch-depth: 0 이 전체 history 를 가져오지만,
        # PR 컨텍스트에서 base 브랜치의 origin/<base> ref 가 항상 set 되어 있지
        # 않을 수 있어 명시적으로 fetch. --depth 는 양의 정수만 허용하므로
        # 옵션 자체를 제거해 전체 fetch (이미 unshallow 상태라 비용 미미).
        run: git fetch --no-tags origin "${{ github.base_ref }}"

      - name: Check migration versions
        run: python3 scripts/check-migration-versions.py --base "origin/${{ github.base_ref }}"
