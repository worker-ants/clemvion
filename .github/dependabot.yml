version: 2
updates:
  # GitHub Actions workflow 의 액션 버전을 주 단위로 점검해 동일 deprecation
  # 사고를 사전 PR 로 차단한다.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  # mermaid-lint 하네스 툴링의 독립 npm 트리. pnpm 워크스페이스 밖이라
  # deps-security-checks.yml(pnpm audit)·config-guard 어디에도 안 걸려, 여기에
  # 등록하기 전까지 이 트리의 CVE 는 영구 무신호였다(2026-07-18 undici HIGH +
  # dompurify moderate 를 뒤늦게 발견).
  #
  # 이 항목은 스케줄 version-update(주간)다 — direct dep 이 없고(transitive 만)
  # 이 트리는 거의 안 변하므로 비-보안 노이즈는 사실상 없다. 신규 CVE 즉시
  # 대응은 repo Settings 의 Dependabot **security updates**(스키마 밖, repo 토글)
  # 가 담당하며 여기 등록이 그 대상 트리로 편입시키는 전제다.
  - package-ecosystem: "npm"
    directory: "/.claude/tools/mermaid-lint"
    schedule:
      interval: "weekly"
